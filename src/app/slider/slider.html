<div class="w-auto rounded-2xl overflow-hidden p-4">

  <swiper-container
    slides-per-view="1"
    loop="true"
    autoplay="true"
    class="mySwiper" pagination="true"
    pagination-dynamic-bullets="true"
  >

    @for (slide of slides; track slide.image) {
      <swiper-slide>
        <div class="relative w-full h-64">
          <img
            alt="logo"
            [src]="slide.image"
            class="w-full h-full object-cover"
          />

          <!-- overlay -->
          <div class="absolute bottom-0 left-0 w-full bg-black/40 text-white p-4">
            <h3 class="text-lg font-semibold">
              {{ slide.title }}
            </h3>
            <p class="text-sm opacity-80">
              {{ slide.description }}
            </p>
          </div>
        </div>
      </swiper-slide>
    }

  </swiper-container>

</div>
