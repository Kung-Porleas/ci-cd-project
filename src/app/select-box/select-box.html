<div class="flex flex-wrap gap-4">
  @for (item of items; track item.id) {
    <button
      type="button"
      (click)="toggleSelection(item)"
      class="relative w-56 h-32 transition-all duration-200"
    >
      <div
        class="flex h-full w-full items-center justify-center border-4 bg-white px-4 text-center transition-all duration-200"
        [ngClass]="{
          'border-blue-500 bg-blue-50 shadow-md': isSelected(item.id),
          'border-slate-300 hover:border-slate-400': !isSelected(item.id)
        }"
      >
        <span class="font-medium text-slate-700">
          {{ item.label }}
        </span>
      </div>
    </button>
  }
</div>
